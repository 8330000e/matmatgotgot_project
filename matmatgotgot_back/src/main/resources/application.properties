# 공통
spring.application.name=matmatgotgot
spring.config.import=optional:file:src/main/resources/application-secret.properties

#server port
server.port=9999

#mysql settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.url=jdbc:mysql://localhost:3306/matgotdb?serverTimezone=UTC&characterEncoding=UTF-8
# spring.datasource.username=root
# spring.datasource.password=${spring-datasource-password}

#mybatis settings
mybatis.configuration.map-underscore-to-camel-case=${mybatis-configuration-map-underscore-to-camel-case}
mybatis.mapper-locations=${mybatis-mapper-locations}
mybatis.type-aliases-package=${mybatis-type-aliases-package}
mybatis.configuration.jdbc-type-for-null=${mybatis-configuration-jdbc-type-for-null}
mybatis-configuration-default-fetch-size=100
mybatis-configuration-default-statement-timeout=30

#email settings


#jwt settings
jwt.secret=${jwt-secret}
jwt.expiration=${jwt-expiration}

# Google OAuth2 Client Settings
spring.security.oauth2.client.registration.google.client-id=${spring-security-oauth2-client-registration-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${spring-security-oauth2-client-registration-google-client-secret}
spring.security.oauth2.client.registration.google.redirect-uri=${spring-security-oauth2-client-registration-google-redirect-uri}

# NAVER KEY  - kgy
naver.client.id.k=${naver-client-id-k}
naver.secret.k=${naver-secret-k}

# CLOVA OCR
clova.ocr.secret-key=${clova-ocr-secret-key}
clova.ocr.api-url=${clova-ocr-api-url}

# NAVER API
naver.client.id=${naver-client-id}
naver.secret=${naver-secret}

# IAM 사용자의 액세스 키
cloud.aws.credentials.access-key=${cloud-aws-credentials-access-key}
cloud.aws.credentials.secret-key=${cloud-aws-credentials-secret-key}
# S3 버킷이 위치한 리전 (서울 리전: ap-northeast-2)
cloud.aws.region.static=ap-northeast-2
# 업로드 대상 S3 버킷 이름
cloud.aws.s3.bucket=${cloud-aws-s3-bucket}