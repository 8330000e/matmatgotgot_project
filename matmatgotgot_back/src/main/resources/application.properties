# 공통
spring.application.name=matmatgotgot
spring.profiles.active=secret

#server port
server.port=9999

#mysql settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/matgotdb?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=admin
spring.datasource.password=${spring.datasource.username}

#mybatis settings
mybatis.configuration.map-underscore-to-camel-case=${mybatis.configuration.map-underscore-to-camel-case}
mybatis.mapper-locations=${mybatis.mapper-locations}
mybatis.type-aliases-package=&{mybatis.type-aliases-package}
mybatis.configuration.jdbc-type-for-null=${mybatis.configuration.jdbc-type-for-null}
mybatis.configuration.default-fetch-size=${mybatis.configuration.default-fetch-size}
mybatis.configuration.default-statement-timeout=${mybatis.configuration.default-statement-timeout}

#thymeleaf settings
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html; charset=UTF-8

#email settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tkavkf30409@gmail.com
spring.mail.password=${spring.mail.password}
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.auth=${spring.mail.properties.mail.smtp.auth}

#jwt settings
jwt.secret=${jwt.secret}
jwt.expiration=${jwt.expiration}

#file upload settings
spring.servlet.multipart.max-file-size=${spring.servlet.multipart.max-file-size}
spring.servlet.multipart.max-request-size=${spring.servlet.multipart.max-request-size}
file.root=${file.root}

# Google OAuth2 Client Settings
spring.security.oauth2.client.registration.google.client-id=${spring.security.oauth2.client.registration.google.client-id}
spring.security.oauth2.client.registration.google.client-secret=${spring.security.oauth2.client.registration.google.client-secret}
spring.security.oauth2.client.registration.google.redirect-uri=${spring.security.oauth2.client.registration.google.redirect-uri}
# CLOVA OCR
clova.ocr.secret-key=${clova.ocr.secret-key}
clova.ocr.api-url=${clova.ocr.api-url}
# NAVER API - jiyeon
naver.client-id=${naver.client-id}
naver.secret=${naver.secret}
# NAVER KEY  - kgy
naver.client.id.k=${naver.client.id.k}
naver.secret.k=${naver.secret.k}
